name: Issues Manager by dev-mb

on:
  push:
    branches:
      - '**'  # ALL Branches
  pull_request:
    types: [opened, synchronize, closed]
    branches:
      - '**'  # ALL Branches

jobs:
  manage-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
      pull-requests: read
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Process Commits and Manage Local Issues
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // ============================================================
            // KONFIGURATION
            // ============================================================
            
            // Keywords zum Schließen von Issues
            const closeKeywords = [
              'close', 'fix', 'resolve',
              'schließen', 'beheben', 'lösen' // ← add new keywords here
            ];
            
            // Keywords zum Erstellen von Issues
            const createKeywords = [
              { keyword: 'todo:', label: 'todo' },
              { keyword: 'bug', label: 'bug' },
              { keyword: 'new issue', label: null },
              { keyword: 'n-iss', label: null }
               // ← add new keywords here
            ];
            
            // ============================================================
            // COMMITS COLLECT
            // ============================================================
            
            let commits = [];
            
            console.log(`Event: ${context.eventName}`);
            console.log(`Ref: ${context.ref}`);
            console.log(`Mode: LOCAL ONLY (kein Cross-Repo)`);
            
            if (context.eventName === 'pull_request') {
              const pr = context.payload.pull_request;
              console.log(`PR #${pr.number} - ${pr.state}`);
              
              const commitsResponse = await github.rest.pulls.listCommits({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number
              });
              
              commits = commitsResponse.data.map(c => c.commit.message);
              commits.push(pr.title);
              if (pr.body) commits.push(pr.body);
              
            } else if (context.eventName === 'push') {
              // Push: Commits aus Payload oder direkt holen
              if (context.payload.commits && context.payload.commits.length > 0) {
                commits = context.payload.commits.map(c => c.message);
              } else {
                console.log('⚠️ Keine Commits im Payload, hole Commit direkt...');
                try {
                  const { data: commit } = await github.rest.repos.getCommit({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    ref: context.sha
                  });
                  commits = [commit.commit.message];
                } catch (error) {
                  console.error('Fehler beim Holen des Commits:', error.message);
                }
              }
            }
            
            console.log(`\nAnalyzing ${commits.length} commits...`);
            if (commits.length > 0) {
              console.log('Commit Messages:');
              commits.forEach((msg, i) => {
                const preview = msg.substring(0, 80).replace(/\n/g, ' ');
                console.log(`  ${i + 1}. ${preview}${msg.length > 80 ? '...' : ''}`);
              });
            }
            
            // ============================================================
            // ISSUES SCHLIESSEN (nur lokale)
            // ============================================================
            
            console.log('\n━━━ CLOSE ISSUES (Local) ━━━');
            const issueNumbers = new Set();
            
            for (const message of commits) {
              if (!message) continue;
              
              const hasKeyword = closeKeywords.some(kw => 
                message.toLowerCase().includes(kw.toLowerCase())
              );
              
              if (hasKeyword) {
                // Nur einfache #123 Referenzen im gleichen Repo
                const issueMatches = [...message.matchAll(/#(\d+)/g)];
                issueMatches.forEach(match => {
                  const issueNum = parseInt(match[1]);
                  if (!isNaN(issueNum)) {
                    issueNumbers.add(issueNum);
                    console.log(`  ✓ Gefunden: #${issueNum}`);
                  }
                });
              }
            }
            
            if (issueNumbers.size === 0) {
              console.log('Keine Issues zum Schließen gefunden.');
            } else {
              console.log(`\nSchließe ${issueNumbers.size} Issue(s)...`);
              
              for (const issueNumber of issueNumbers) {
                try {
                  const { data: issue } = await github.rest.issues.get({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: issueNumber
                  });
                  
                  if (issue.state === 'open') {
                    await github.rest.issues.update({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: issueNumber,
                      state: 'closed'
                    });
                    
                    const eventType = context.eventName === 'pull_request' 
                      ? `PR #${context.payload.pull_request.number}`
                      : `commit ${context.sha.substring(0, 7)}`;
                    
                    await github.rest.issues.createComment({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: issueNumber,
                      body: `🤖 Auto-closed | ${eventType}`
                    });
                    
                    console.log(`  ✓ Issue #${issueNumber} geschlossen`);
                  } else {
                    console.log(`  ℹ Issue #${issueNumber} bereits geschlossen`);
                  }
                } catch (error) {
                  console.error(`  ✗ Fehler bei #${issueNumber}: ${error.message}`);
                }
              }
            }
            
            // ============================================================
            // ISSUES ERSTELLEN (nur lokale)
            // ============================================================
            
            console.log('\n━━━ CREATE ISSUES (Local) ━━━');
            const issuesToCreate = [];
            
            for (const message of commits) {
              if (!message) continue;
              
              const lines = message.split('\n');
              
              for (const line of lines) {
                const trimmedLine = line.trim();
                if (!trimmedLine) continue;
                
                // Alle Create-Keywords durchgehen
                for (const { keyword, label } of createKeywords) {
                  const lowerLine = trimmedLine.toLowerCase();
                  
                  if (lowerLine.startsWith(keyword.toLowerCase())) {
                    let title = trimmedLine.substring(keyword.length).trim();
                    
                    if (title.startsWith(':')) {
                      title = title.substring(1).trim();
                    }
                    
                    if (title) {
                      const commitRef = context.eventName === 'pull_request'
                        ? `PR #${context.payload.pull_request.number}`
                        : `${context.sha.substring(0, 7)}`;
                      
                      issuesToCreate.push({
                        title: title,
                        body: `🤖 Auto-created | ${commitRef}`,
                        labels: label ? [label] : []
                      });
                      
                      console.log(`  ✓ Gefunden: "${title}" (${keyword})`);
                    }
                    
                    break;
                  }
                }
              }
            }
            
            if (issuesToCreate.length === 0) {
              console.log('Keine neuen Issues gefunden.');
            } else {
              console.log(`\nErstelle ${issuesToCreate.length} Issue(s)...`);
              
              for (const issueData of issuesToCreate) {
                try {
                  const { data: newIssue } = await github.rest.issues.create({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    title: issueData.title,
                    body: issueData.body,
                    labels: issueData.labels
                  });
                  
                  console.log(`  ✓ Issue #${newIssue.number} erstellt: ${issueData.title}`);
                } catch (error) {
                  console.error(`  ✗ Fehler beim Erstellen: ${error.message}`);
                }
              }
            }
            
            console.log('\n✅ Fertig!');